<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Time Yet</title>
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="./styles.css">
    <script type="text/javascript" src="dist/purify.min.js"></script>
  </head>
  <body>
    <main>
      <span class="a11y-warning">
        <p>This site contains an animation. Uncheck box to turn off:</p>
        <label for="a11y-checkbox"></label>
        <input type="checkbox" id="a11y-checkbox" class="a11y-checkbox" checked />
      </span>
      <div id="timer-container" class="timer-container">
        <h1>Is It Time Yet?</h1>
        <div id="answer-container">
          <div id="no" class="answer no hidden">No</div>
          <div id="yes-text" class="answer yes hidden">YES</div>
          <object id="yes-svg" class="hidden" data="yes.svg" type="image/svg+xml" alt="yes"></object>
        </div>
        <div id="timer" class="timer">
          <span id="hours" class="time hours">00:</span>
          <span id="minutes" class="time minutes">00:</span>
          <span id="seconds" class="time seconds">00</span>
        </div>
        <h2>Enter your target date:</h2>
        <div class="input-container">
          <div class="button-container">
            <button id="start" class="start">Start</button>
            <button id="stop" class="stop">Stop/Reset</button>
          </div>
          <label for="datepicker"></label>
          <input id="datepicker" class="datepicker" name="datepicker" type="datetime-local" min="" />
        </div>
      </div>
    </main>
    <script src="timer.js"></script>
  </body>
</html>
